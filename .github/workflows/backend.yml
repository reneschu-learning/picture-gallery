name: Build and Push Backend

on: workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: rsdemos.azurecr.io
  IMAGE_NAME: picture-gallery-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name rsdemos

      - name: Resolve and validate release version
        id: version
        run: |
          package_version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = Path('backend/pyproject.toml')
          data = tomllib.loads(pyproject.read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )

          echo "package=$package_version" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "Tag version ($tag_version) does not match pyproject.toml version ($package_version)."
              exit 1
            fi
          fi

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.package }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
